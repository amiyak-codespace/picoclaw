services:
  picoclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: picoclaw
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file: .env
    volumes:
      # ✅ Memory & WhatsApp session — stored OUTSIDE repo, never wiped by git/rebuild
      - /Users/amiyakumar.m/Ws/ai-space/picoclaw_store:/root/.picoclaw
      # Dev projects workspace
      - /Users/amiyakumar.m/Ws/ai-space/ai-engineer:/root/ws/ai-space/ai-engineer
      # Docker socket so AI can run docker commands
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "18790:18790"
    deploy:
      resources:
        limits:
          memory: 2g
